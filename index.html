<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알바비 다이어리</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function AlbaDiary() {
            // LocalStorage에서 데이터 가져오기
            const [records, setRecords] = useState(() => {
                try {
                    const saved = localStorage.getItem('alba_records');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    return [];
                }
            });
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [startTime, setStartTime] = useState('09:00');
            const [endTime, setEndTime] = useState('18:00');
            const [hourlyRate, setHourlyRate] = useState('10000');
            const [workplaceIndex, setWorkplaceIndex] = useState('1');
            const [workplaceName1, setWorkplaceName1] = useState('근무지1');
            const [workplaceName2, setWorkplaceName2] = useState('근무지2');
            const [workplaceName3, setWorkplaceName3] = useState('근무지3');
            const [showSettings, setShowSettings] = useState(false);
            const [currentDate, setCurrentDate] = useState(new Date());

            // 데이터 바뀔 때마다 자동 저장
            useEffect(() => {
                localStorage.setItem('alba_records', JSON.stringify(records));
            }, [records]);

            const calculateHours = (start, end) => {
                const [startH, startM] = start.split(':').map(Number);
                const [endH, endM] = end.split(':').map(Number);
                let startMinutes = startH * 60 + startM;
                let endMinutes = endH * 60 + endM;
                if (endMinutes < startMinutes) endMinutes += 24 * 60;
                return (endMinutes - startMinutes) / 60;
            };

            const addRecord = () => {
                if (!date || !startTime || !endTime || !hourlyRate) {
                    alert('모든 항목을 입력해주세요');
                    return;
                }
                const hours = calculateHours(startTime, endTime);
                if (hours <= 0) {
                    alert('종료 시간이 시작 시간보다 커야 합니다');
                    return;
                }
                const dailyPay = hours * parseInt(hourlyRate);
                let selectedWorkplaceName = workplaceName1;
                if (workplaceIndex === '2') selectedWorkplaceName = workplaceName2;
                if (workplaceIndex === '3') selectedWorkplaceName = workplaceName3;

                const newRecord = {
                    id: Date.now(),
                    date,
                    startTime,
                    endTime,
                    hours: hours.toFixed(2),
                    hourlyRate: parseInt(hourlyRate),
                    dailyPay: Math.round(dailyPay),
                    workplaceIndex,
                    workplaceName: selectedWorkplaceName,
                };

                setRecords([newRecord, ...records]);
                setDate(new Date().toISOString().split('T')[0]);
                setStartTime('09:00');
                setEndTime('18:00');
            };

            const deleteRecord = (id) => {
                setRecords(records.filter(r => r.id !== id));
            };

            const totalPay = records.reduce((sum, r) => sum + r.dailyPay, 0);
            const totalHours = records.reduce((sum, r) => sum + parseFloat(r.hours), 0);

            const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            
            const daysInMonth = getDaysInMonth(currentDate);
            const firstDay = getFirstDayOfMonth(currentDate);
            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);

            const getPayByDate = (day) => {
                const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return records.filter(r => r.date === dateStr).reduce((sum, r) => sum + r.dailyPay, 0);
            };

            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1));

            const sortedRecords = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
            const monthStr = currentDate.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long' });

            const handleDateClick = (day) => {
                if (day === null) return;
                const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayRecord = records.find(r => r.date === dateStr);
                if (dayRecord) {
                    setDate(dayRecord.date);
                    setStartTime(dayRecord.startTime);
                    setEndTime(dayRecord.endTime);
                    setHourlyRate(dayRecord.hourlyRate.toString());
                    setWorkplaceIndex(dayRecord.workplaceIndex);
                } else {
                    setDate(dateStr);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-100 to-blue-50 p-6">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-white rounded-2xl shadow-lg p-4 lg:p-6 mb-4 lg:mb-6">
                            <h1 className="text-xl lg:text-4xl font-bold text-blue-600 mb-1">💼 알바비 다이어리</h1>
                            <p className="text-xs text-gray-400 font-semibold">Made with ❤️ by ⓒ 다락글방</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            <div className="bg-white rounded-2xl shadow-lg p-4 lg:p-6">
                                <h2 className="text-lg lg:text-xl font-bold text-gray-800 mb-3 lg:mb-4">📝 근무 기록 추가</h2>
                                <div className="space-y-4">
                                    {showSettings && (
                                        <div className="bg-gray-50 border-2 border-gray-300 rounded-lg p-4 mb-4">
                                            <h3 className="text-sm font-bold text-gray-800 mb-3">근무지 이름 설정</h3>
                                            <div className="space-y-3">
                                                <div>
                                                    <label className="block text-xs font-semibold text-gray-700 mb-1">첫번째 근무지</label>
                                                    <input type="text" value={workplaceName1} onChange={(e) => setWorkplaceName1(e.target.value)} className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-sm" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-semibold text-gray-700 mb-1">두번째 근무지</label>
                                                    <input type="text" value={workplaceName2} onChange={(e) => setWorkplaceName2(e.target.value)} className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-sm" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-semibold text-gray-700 mb-1">세번째 근무지</label>
                                                    <input type="text" value={workplaceName3} onChange={(e) => setWorkplaceName3(e.target.value)} className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-sm" />
                                                </div>
                                                <button onClick={() => setShowSettings(false)} className="w-full bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-2 rounded-lg">완료</button>
                                            </div>
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">📅 날짜</label>
                                        <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full px-4 py-3 border-2 border-blue-200 rounded-lg" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">🕐 시작시간</label>
                                            <input type="time" value={startTime} onChange={(e) => setStartTime(e.target.value)} className="w-full px-4 py-3 border-2 border-blue-200 rounded-lg" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">🕕 종료시간</label>
                                            <input type="time" value={endTime} onChange={(e) => setEndTime(e.target.value)} className="w-full px-4 py-3 border-2 border-blue-200 rounded-lg" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">💰 시급 (원)</label>
                                        <input type="number" value={hourlyRate} onChange={(e) => setHourlyRate(e.target.value)} className="w-full px-4 py-3 border-2 border-blue-200 rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">🏢 근무지</label>
                                        <select value={workplaceIndex} onChange={(e) => setWorkplaceIndex(e.target.value)} className="w-full px-4 py-3 border-2 border-blue-200 rounded-lg">
                                            <option value="1">{workplaceName1}</option>
                                            <option value="2">{workplaceName2}</option>
                                            <option value="3">{workplaceName3}</option>
                                        </select>
                                    </div>
                                    <button onClick={() => setShowSettings(!showSettings)} className="w-full bg-gray-500 text-white font-bold py-2 rounded-lg">⚙️ 근무지 이름 설정</button>
                                    <button onClick={addRecord} className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">기록 추가</button>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-lg p-4 lg:p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <button onClick={prevMonth} className="p-2 bg-blue-50 rounded-lg">이전달</button>
                                    <h3 className="text-lg font-bold text-gray-800">{monthStr}</h3>
                                    <button onClick={nextMonth} className="p-2 bg-blue-50 rounded-lg">다음달</button>
                                </div>
                                <div className="grid grid-cols-7 gap-1 mb-2">
                                    {['일', '월', '화', '수', '목', '금', '토'].map(d => <div key={d} className="text-center font-bold text-gray-600 py-2 text-sm">{d}</div>)}
                                </div>
                                <div className="grid grid-cols-7 gap-1 mb-4">
                                    {days.map((day, idx) => {
                                        if (day === null) return <div key={idx} className="aspect-square bg-gray-50 rounded-lg"></div>;
                                        const pay = getPayByDate(day);
                                        const hasRecord = pay > 0;
                                        
                                        const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                        const dayWorkplaces = records.filter(r => r.date === dateStr).map(r => r.workplaceIndex);
                                        const uniqueWorkplaces = [...new Set(dayWorkplaces)];

                                        let bgColor = 'bg-gray-100'; let textColor = 'text-gray-600'; let borderColor = '';
                                        if (hasRecord) {
                                            textColor = 'text-white';
                                            if (uniqueWorkplaces.length === 1) {
                                                if (uniqueWorkplaces[0] === '1') bgColor = 'bg-orange-500';
                                                else if (uniqueWorkplaces[0] === '2') bgColor = 'bg-green-500';
                                                else bgColor = 'bg-blue-500';
                                            } else {
                                                bgColor = 'bg-white'; textColor = 'text-gray-800'; borderColor = 'border-2 border-blue-500';
                                            }
                                        }

                                        return (
                                            <button key={idx} onClick={() => handleDateClick(day)} className={`aspect-square p-1 rounded-lg flex flex-col items-center justify-center ${bgColor} ${textColor} ${borderColor}`}>
                                                <span className="text-xs font-bold">{day}</span>
                                                {hasRecord && <span className="text-[10px] opacity-90">{(pay/1000).toFixed(0)}k</span>}
                                            </button>
                                        );
                                    })}
                                </div>
                                <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-4 text-center">
                                    <p className="text-sm font-semibold text-gray-700 mb-2">이달 급여 합계</p>
                                    <p className="text-2xl font-bold text-blue-600">
                                        {records.filter(r => {
                                            const rd = new Date(r.date);
                                            return rd.getFullYear() === currentDate.getFullYear() && rd.getMonth() === currentDate.getMonth();
                                        }).reduce((sum, r) => sum + r.dailyPay, 0).toLocaleString()}원
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-3 mb-6 text-white text-center">
                            <div className="bg-blue-500 rounded-xl p-3 shadow-lg">
                                <p className="text-xs font-semibold opacity-90">총 근무시간</p>
                                <p className="text-xl font-bold">{totalHours.toFixed(1)}h</p>
                            </div>
                            <div className="bg-green-500 rounded-xl p-3 shadow-lg">
                                <p className="text-xs font-semibold opacity-90">총 급여</p>
                                <p className="text-xl font-bold">{totalPay.toLocaleString()}원</p>
                            </div>
                            <div className="bg-purple-500 rounded-xl p-3 shadow-lg">
                                <p className="text-xs font-semibold opacity-90">기록 개수</p>
                                <p className="text-xl font-bold">{records.length}건</p>
                            </div>
                        </div>

                        {records.length === 0 ? (
                            <div className="bg-white rounded-2xl shadow-lg p-8 text-center text-gray-500"><p>아직 기록이 없습니다</p></div>
                        ) : (
                            <div className="bg-white rounded-2xl shadow-lg p-6 overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                    <thead>
                                        <tr className="border-b-2 border-blue-300 bg-blue-50 text-gray-700 font-bold">
                                            <th className="p-2">날짜</th><th className="p-2">근무지</th><th className="p-2 text-center">시간</th><th className="p-2 text-right">일급</th><th className="p-2 text-center">삭제</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sortedRecords.map(r => (
                                            <tr key={r.id} className="border-b border-gray-200 hover:bg-blue-50">
                                                <td className="p-2">{r.date.substring(5)}</td>
                                                <td className="p-2"><span className="text-xs font-bold px-1.5 py-0.5 rounded bg-blue-100 text-blue-700">{r.workplaceName}</span></td>
                                                <td className="p-2 text-center">{parseFloat(r.hours).toFixed(1)}h</td>
                                                <td className="p-2 text-right font-bold text-blue-600">{r.dailyPay.toLocaleString()}원</td>
                                                <td className="p-2 text-center">
                                                    <button onClick={() => deleteRecord(r.id)} className="bg-red-500 text-white px-2 py-0.5 rounded text-xs">삭제</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {records.length > 0 && (
                            <div className="mt-6 flex justify-center">
                                <button onClick={() => window.confirm('모든 기록을 삭제하시겠습니까?') && setRecords([])} className="bg-gray-500 text-white font-bold py-2 px-6 rounded-lg">
                                    전체 초기화
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<AlbaDiary />, document.getElementById('root'));
    </script>
</body>
</html>
