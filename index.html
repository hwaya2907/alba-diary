<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼 알바비 다이어리</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            min-height: 100vh;
            padding: 24px 16px;
            overflow-x: hidden;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 24px;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #1976d2, #42a5f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 12px;
            color: #bbb;
            font-weight: 600;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 24px;
        }

        .card h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #bbdefb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1976d2;
        }

        .time-inputs {
            display: flex;
            gap: 8px;
        }

        .time-inputs select:first-child {
            flex: 1;
        }

        .time-inputs select:last-child {
            width: 100px;
        }

        /* 모바일용 2열 레이아웃 */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-row.date-hourly .form-group:first-child input {
    width: fit-content;
}

        button {
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #1976d2, #1565c0);
            color: white;
            padding: 12px;
            font-size: 14px;
            margin-top: 4px;
        }

        .btn-primary:hover {
            box-shadow: 0 5px 15px rgba(25, 118, 210, 0.3);
        }

        .btn-secondary {
            width: 100%;
            background: #757575;
            color: white;
            padding: 8px;
            font-size: 14px;
            margin-top: 8px;
        }

        .btn-secondary:hover {
            background: #616161;
        }

        .btn-small {
            padding: 4px 8px;
            background: #ef5350;
            color: white;
            font-size: 12px;
        }

        .btn-small:hover {
            background: #e53935;
        }

        .settings-box {
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .settings-box h3 {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .calendar-nav button {
            padding: 8px;
            background: transparent;
            color: #1976d2;
            font-size: 20px;
        }

        .calendar-nav button:hover {
            background: #e3f2fd;
        }

        .calendar-nav h3 {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .weekday {
            text-align: center;
            font-weight: 700;
            color: #666;
            padding: 6px;
            font-size: 11px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .calendar-day {
            aspect-ratio: 1;
            padding: 4px;
            border-radius: 8px;
            text-align: center;
            font-size: 9px;
            cursor: pointer;
            border: none;
            background: #f5f5f5;
            color: #bbb;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            line-height: 1.1;
            min-height: 45px;
        }

        .calendar-day:hover:not(:disabled) {
            opacity: 0.8;
        }

        .calendar-day.empty {
            cursor: default;
            background: #fafafa;
        }

        .calendar-day.workplace1 {
            background: linear-gradient(135deg, #ff9800, #fb8c00);
            color: white;
            font-weight: 700;
        }

        .calendar-day.workplace2 {
            background: linear-gradient(135deg, #66bb6a, #43a047);
            color: white;
            font-weight: 700;
        }

        .calendar-day.workplace3 {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
            color: white;
            font-weight: 700;
        }

        .calendar-day.multi {
            background: white;
            color: #333;
            border: 2px solid #ff9800;
            font-weight: 700;
        }

        .calendar-day span {
            display: block;
            white-space: nowrap;
        }

        .calendar-day span:first-child {
            font-size: 11px;
            font-weight: 700;
        }

        .calendar-day span:last-child {
            font-size: 7px;
            opacity: 0.8;
            margin-top: 1px;
        }

        .monthly-summary {
            background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
            border: 2px solid #90caf9;
            border-radius: 8px;
            padding: 16px;
        }

        .monthly-summary p {
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-align: center;
            margin-bottom: 12px;
        }

        .workplace-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid;
        }

        .workplace-summary.w1 {
            border-left-color: #ff9800;
        }

        .workplace-summary.w2 {
            border-left-color: #66bb6a;
        }

        .workplace-summary.w3 {
            border-left-color: #42a5f5;
        }

        .workplace-summary span:first-child {
            font-weight: 600;
            color: #555;
            font-size: 13px;
        }

        .workplace-summary span:last-child {
            font-size: 16px;
            font-weight: 700;
        }

        .workplace-summary.w1 span:last-child {
            color: #ff9800;
        }

        .workplace-summary.w2 span:last-child {
            color: #66bb6a;
        }

        .workplace-summary.w3 span:last-child {
            color: #42a5f5;
        }

        .total-summary {
            background: linear-gradient(135deg, #42a5f5, #1976d2);
            color: white;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            margin-top: 8px;
        }

        .total-summary p:first-child {
            font-size: 11px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .total-summary p:last-child {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-card {
            border-radius: 12px;
            padding: 16px;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .summary-card.blue {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
        }

        .summary-card.green {
            background: linear-gradient(135deg, #66bb6a, #43a047);
        }

        .summary-card.purple {
            background: linear-gradient(135deg, #ab47bc, #8e24aa);
        }

        .summary-card p:first-child {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .summary-card p:nth-child(2) {
            font-size: 28px;
            font-weight: 700;
        }

        .summary-card p:last-child {
            font-size: 11px;
            opacity: 0.75;
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .records-table thead {
            background: #e3f2fd;
            border-bottom: 2px solid #90caf9;
        }

        .records-table th {
            padding: 12px;
            text-align: left;
            font-weight: 700;
            color: #555;
        }

        .records-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .records-table tr:hover {
            background: #f5f5f5;
        }

        .workplace-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 11px;
        }

        .workplace-badge.w1 {
            background: #ffe0b2;
            color: #e65100;
        }

        .workplace-badge.w2 {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .workplace-badge.w3 {
            background: #bbdefb;
            color: #1565c0;
        }

        .pay-amount {
            font-weight: 700;
            color: #1976d2;
        }

        .empty-state {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 64px 24px;
            text-align: center;
        }

        .empty-state p {
            color: #999;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .empty-state p:last-child {
            color: #bbb;
            font-size: 14px;
        }

        .center-button {
            display: flex;
            justify-content: center;
            margin-top: 24px;
        }

        .btn-reset {
            background: #757575;
            color: white;
            padding: 10px 24px;
            font-size: 14px;
        }

        .btn-reset:hover {
            background: #616161;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 20px;
            }

            .card h2 {
                font-size: 16px;
            }

            .form-group input,
            .form-group select {
                padding: 10px;
                font-size: 16px;
            }

            .time-inputs {
                gap: 6px;
            }

            .time-inputs select:last-child {
                width: 70px;
            }

            /* 버튼 한 줄 */
            .btn-secondary {
                width: 48%;
                display: inline-block;
                margin-right: 2%;
                margin-top: 8px;
                padding: 10px;
                font-size: 12px;
            }

            .btn-primary {
                width: 48%;
                display: inline-block;
                margin-right: 0;
                margin-top: 8px;
                padding: 10px;
                font-size: 12px;
            }

            .weekdays {
                gap: 4px;
            }

            .calendar-days {
                gap: 4px;
            }

            .calendar-day {
                font-size: 8px;
                padding: 2px;
                min-height: 40px;
            }

            .calendar-day span:first-child {
                font-size: 9px;
            }

            .calendar-day span:last-child {
                font-size: 6px;
            }

            .weekday {
                font-size: 10px;
                padding: 4px;
                height: 28px;
            }

            .summary-cards {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .summary-card {
                padding: 12px;
            }

            .summary-card p:nth-child(2) {
                font-size: 20px;
            }

            .records-table {
                font-size: 11px;
            }

            .records-table th,
            .records-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💼 알바비 다이어리</h1>
            <p>Made with ❤️ by ⓒ 다락글방</p>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2>📝 근무 기록 추가</h2>
                
                <div id="settingsBox" class="settings-box" style="display: none;">
                    <h3>근무지 이름 설정</h3>
                    <div class="form-group">
                        <label>첫번째 근무지</label>
                        <input type="text" id="workplaceName1" value="근무지1" placeholder="예: 카페">
                    </div>
                    <div class="form-group">
                        <label>두번째 근무지</label>
                        <input type="text" id="workplaceName2" value="근무지2" placeholder="예: 편의점">
                    </div>
                    <div class="form-group">
                        <label>세번째 근무지</label>
                        <input type="text" id="workplaceName3" value="근무지3" placeholder="예: 학원">
                    </div>
                    <button class="btn-secondary" onclick="toggleSettings()">완료</button>
                </div>

                <!-- 날짜 + 시급 한 줄 -->
                <div class="form-row date-hourly">
                    <div class="form-group">
                        <label>📅 날짜</label>
                        <input type="date" id="inputDate">
                    </div>
                    <div class="form-group">
                        <label>💰 시급 (원)</label>
                        <input type="number" id="hourlyRate" value="10000" placeholder="10000">
                    </div>
                </div>

                <!-- 시작시간 + 종료시간 한 줄 -->
                <div class="form-row">
                    <div class="form-group">
                        <label>🕐 시작시간</label>
                        <div class="time-inputs">
                            <select id="startHour">
                                <option>00</option><option>01</option><option>02</option><option>03</option><option>04</option><option>05</option><option>06</option><option>07</option><option>08</option><option selected>09</option><option>10</option><option>11</option><option>12</option><option>13</option><option>14</option><option>15</option><option>16</option><option>17</option><option>18</option><option>19</option><option>20</option><option>21</option><option>22</option><option>23</option>
                            </select>
                            <select id="startMinute">
                                <option selected>00</option><option>15</option><option>30</option><option>45</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>🕕 종료시간</label>
                        <div class="time-inputs">
                            <select id="endHour">
                                <option>00</option><option>01</option><option>02</option><option>03</option><option>04</option><option>05</option><option>06</option><option>07</option><option>08</option><option>09</option><option>10</option><option>11</option><option>12</option><option>13</option><option>14</option><option>15</option><option>16</option><option>17</option><option selected>18</option><option>19</option><option>20</option><option>21</option><option>22</option><option>23</option>
                            </select>
                            <select id="endMinute">
                                <option selected>00</option><option>15</option><option>30</option><option>45</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 근무지 (전체) -->
                <div class="form-group">
                    <label>🏢 근무지</label>
                    <select id="workplaceIndex">
                        <option value="1">근무지1</option>
                        <option value="2">근무지2</option>
                        <option value="3">근무지3</option>
                    </select>
                </div>

                <!-- 버튼 한 줄 -->
                <button class="btn-secondary" onclick="toggleSettings()">⚙️ 근무지 이름 설정</button>
                <button class="btn-primary" onclick="addRecord()">➕ 기록 추가</button>
            </div>

            <div class="card">
                <h2>📅 월별 달력</h2>
                
                <div class="calendar-nav">
                    <button onclick="prevMonth()">◀</button>
                    <h3 id="monthTitle"></h3>
                    <button onclick="nextMonth()">▶</button>
                </div>

                <div class="weekdays">
                    <div class="weekday">일</div>
                    <div class="weekday">월</div>
                    <div class="weekday">화</div>
                    <div class="weekday">수</div>
                    <div class="weekday">목</div>
                    <div class="weekday">금</div>
                    <div class="weekday">토</div>
                </div>

                <div class="calendar-days" id="calendarDays"></div>

                <div class="monthly-summary">
                    <p>이달 급여 합계</p>
                    <div id="monthlySummaryContent"></div>
                </div>
            </div>
        </div>

        <div class="summary-cards">
            <div class="summary-card blue">
                <p>총 근무시간</p>
                <p id="totalHours">0</p>
                <p>시간</p>
            </div>
            <div class="summary-card green">
                <p>총 급여</p>
                <p id="totalPay">0</p>
                <p>원</p>
            </div>
            <div class="summary-card purple">
                <p>기록 개수</p>
                <p id="recordCount">0</p>
                <p>건</p>
            </div>
        </div>

        <div id="recordsSection"></div>
        <div id="resetButtonContainer"></div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('albaRecords')) || [];
        let currentDate = new Date();
        let workplaceNames = JSON.parse(localStorage.getItem('workplaceNames')) || {
            name1: '근무지1',
            name2: '근무지2',
            name3: '근무지3'
        };

        function init() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputDate').value = today;
            updateWorkplaceSelects();
            renderCalendar();
            renderRecords();
            updateSummary();
        }

        function updateWorkplaceSelects() {
            document.getElementById('workplaceIndex').innerHTML = `
                <option value="1">${workplaceNames.name1}</option>
                <option value="2">${workplaceNames.name2}</option>
                <option value="3">${workplaceNames.name3}</option>
            `;
        }

        function toggleSettings() {
            const settingsBox = document.getElementById('settingsBox');
            settingsBox.style.display = settingsBox.style.display === 'none' ? 'block' : 'none';
            
            if (settingsBox.style.display === 'none') {
                workplaceNames.name1 = document.getElementById('workplaceName1').value;
                workplaceNames.name2 = document.getElementById('workplaceName2').value;
                workplaceNames.name3 = document.getElementById('workplaceName3').value;
                localStorage.setItem('workplaceNames', JSON.stringify(workplaceNames));
                updateWorkplaceSelects();
                renderCalendar();
                renderRecords();
            }
        }

        function calculateHours(startTime, endTime) {
            const [startH, startM] = startTime.split(':').map(Number);
            const [endH, endM] = endTime.split(':').map(Number);
            let startMinutes = startH * 60 + startM;
            let endMinutes = endH * 60 + endM;
            
            if (endMinutes < startMinutes) {
                endMinutes += 24 * 60;
            }
            
            return (endMinutes - startMinutes) / 60;
        }

        function addRecord() {
            const date = document.getElementById('inputDate').value;
            const startHour = document.getElementById('startHour').value;
            const startMinute = document.getElementById('startMinute').value;
            const endHour = document.getElementById('endHour').value;
            const endMinute = document.getElementById('endMinute').value;
            const hourlyRate = parseInt(document.getElementById('hourlyRate').value);
            const workplaceIndex = document.getElementById('workplaceIndex').value;

            if (!date || !hourlyRate) {
                alert('모든 항목을 입력해주세요');
                return;
            }

            const startTime = `${startHour}:${startMinute}`;
            const endTime = `${endHour}:${endMinute}`;
            const hours = calculateHours(startTime, endTime);

            if (hours <= 0) {
                alert('종료 시간이 시작 시간보다 커야 합니다');
                return;
            }

            const dailyPay = hours * hourlyRate;
            const workplaceName = 
                workplaceIndex === '1' ? workplaceNames.name1 :
                workplaceIndex === '2' ? workplaceNames.name2 :
                workplaceNames.name3;

            const newRecord = {
                id: Date.now(),
                date,
                startTime,
                endTime,
                hours: hours.toFixed(2),
                hourlyRate,
                dailyPay: Math.round(dailyPay),
                workplaceIndex,
                workplaceName
            };

            records.unshift(newRecord);
            localStorage.setItem('albaRecords', JSON.stringify(records));

            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('startHour').value = '09';
            document.getElementById('endHour').value = '18';

            renderCalendar();
            renderRecords();
            updateSummary();
        }

        function deleteRecord(id) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem('albaRecords', JSON.stringify(records));
            renderCalendar();
            renderRecords();
            updateSummary();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthTitle').textContent = 
                new Date(year, month).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'calendar-day empty';
                calendarDays.appendChild(emptyDiv);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayRecords = records.filter(r => r.date === dateStr);
                const pay = dayRecords.reduce((sum, r) => sum + r.dailyPay, 0);
                
                const button = document.createElement('button');
                button.className = 'calendar-day';
                button.type = 'button';

                if (dayRecords.length === 0) {
                    button.classList.add('empty');
                } else {
                    const workplaces = [...new Set(dayRecords.map(r => r.workplaceIndex))];
                    if (workplaces.length === 1) {
                        button.classList.add(`workplace${workplaces[0]}`);
                    } else {
                        button.classList.add('multi');
                    }
                }

                button.innerHTML = `<span>${day}</span>`;
                if (pay > 0) {
                    button.innerHTML += `<span>${(pay/1000).toFixed(0)}k</span>`;
                }

                button.onclick = () => handleDateClick(dateStr);
                calendarDays.appendChild(button);
            }

            renderMonthlySummary();
        }

        function renderMonthlySummary() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthRecords = records.filter(r => {
                const rDate = new Date(r.date);
                return rDate.getFullYear() === year && rDate.getMonth() === month;
            });

            const w1 = monthRecords.filter(r => r.workplaceIndex === '1').reduce((sum, r) => sum + r.dailyPay, 0);
            const w2 = monthRecords.filter(r => r.workplaceIndex === '2').reduce((sum, r) => sum + r.dailyPay, 0);
            const w3 = monthRecords.filter(r => r.workplaceIndex === '3').reduce((sum, r) => sum + r.dailyPay, 0);
            const total = w1 + w2 + w3;

            let html = '';
            if (w1 > 0) html += `<div class="workplace-summary w1"><span>${workplaceNames.name1}</span><span>${w1.toLocaleString()}원</span></div>`;
            if (w2 > 0) html += `<div class="workplace-summary w2"><span>${workplaceNames.name2}</span><span>${w2.toLocaleString()}원</span></div>`;
            if (w3 > 0) html += `<div class="workplace-summary w3"><span>${workplaceNames.name3}</span><span>${w3.toLocaleString()}원</span></div>`;
            
            html += `<div class="total-summary"><p>전체 합계</p><p>${total.toLocaleString()}원</p></div>`;

            document.getElementById('monthlySummaryContent').innerHTML = html;
        }

        function handleDateClick(dateStr) {
            const dayRecord = records.find(r => r.date === dateStr);
            document.getElementById('inputDate').value = dateStr;
            
            if (dayRecord) {
                const [sh, sm] = dayRecord.startTime.split(':');
                const [eh, em] = dayRecord.endTime.split(':');
                document.getElementById('startHour').value = sh;
                document.getElementById('startMinute').value = sm;
                document.getElementById('endHour').value = eh;
                document.getElementById('endMinute').value = em;
                document.getElementById('hourlyRate').value = dayRecord.hourlyRate;
                document.getElementById('workplaceIndex').value = dayRecord.workplaceIndex;
            }
        }

        function renderRecords() {
            const sorted = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            if (sorted.length === 0) {
                document.getElementById('recordsSection').innerHTML = `
                    <div class="empty-state">
                        <p>아직 기록이 없습니다</p>
                        <p>위에서 근무 기록을 추가해주세요</p>
                    </div>
                `;
                document.getElementById('resetButtonContainer').innerHTML = '';
                return;
            }

            let html = `
                <div class="card">
                    <h2>📊 근무 기록</h2>
                    <div class="table-wrapper">
                        <table class="records-table">
                            <thead>
                                <tr>
                                    <th>날짜</th>
                                    <th>근무지</th>
                                    <th>시간</th>
                                    <th>시급</th>
                                    <th>일급</th>
                                    <th>삭제</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            sorted.forEach(record => {
                const date = new Date(record.date + 'T00:00:00');
                const dateStr = date.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' });
                const workplaceClass = `w${record.workplaceIndex}`;
                const shortName = record.workplaceName.charAt(0);

                html += `
                    <tr>
                        <td>${dateStr}</td>
                        <td><span class="workplace-badge ${workplaceClass}">${shortName}</span></td>
                        <td>${parseFloat(record.hours).toFixed(1)}h</td>
                        <td>${record.hourlyRate.toLocaleString()}</td>
                        <td class="pay-amount">${record.dailyPay.toLocaleString()}</td>
                        <td><button class="btn-small" onclick="deleteRecord(${record.id})">삭제</button></td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            document.getElementById('recordsSection').innerHTML = html;

            document.getElementById('resetButtonContainer').innerHTML = `
                <div class="center-button">
                    <button class="btn-reset" onclick="resetAll()">🔄 초기화</button>
                </div>
            `;
        }

        function updateSummary() {
            const totalHours = records.reduce((sum, r) => sum + parseFloat(r.hours), 0);
            const totalPay = records.reduce((sum, r) => sum + r.dailyPay, 0);

            document.getElementById('totalHours').textContent = totalHours.toFixed(1);
            document.getElementById('totalPay').textContent = totalPay.toLocaleString();
            document.getElementById('recordCount').textContent = records.length;
        }

        function prevMonth() {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1);
            renderCalendar();
        }

        function resetAll() {
            if (confirm('모든 기록을 삭제하시겠습니까?')) {
                records = [];
                localStorage.setItem('albaRecords', JSON.stringify(records));
                renderCalendar();
                renderRecords();
                updateSummary();
            }
        }

        init();
    </script>
</body>
</html>
